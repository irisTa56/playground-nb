[tools]
python = "3.12"
uv = "latest"

[tasks.pre-commit]
description = "Pre-commit checks for daft project"
depends = ["nb:sync", "lint", "typecheck"]

[tasks."nb:sync"]
description = "Generate .ipynb from all .py notebooks"
run = """
shopt -s nullglob
for f in notebooks/*.py; do
  uv run jupytext --to notebook "$f"
done
"""

[tasks."nb:clean"]
description = "Remove all generated .ipynb files"
run = "rm -f notebooks/*.ipynb"

[tasks.lint]
description = "Lint and format with ruff"
wait_for = ["nb:sync"]
run = """
uv run ruff check --fix .
uv run ruff format .
"""

[tasks.typecheck]
description = "Type check with ty"
wait_for = ["nb:sync"]
run = "uv run ty check"
