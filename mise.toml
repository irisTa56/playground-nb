[tools]
cargo-binstall = "latest"
"cargo:lychee" = "latest"
"cargo:rumdl" = "latest"

[tasks.pre-commit]
description = "Run all pre-commit checks"
depends = [
  "format-md",
  "link-check",
]

[tasks.format-md]
description = "Format markdown files"
run = """
if [ -z "$STAGED" ]; then
  rumdl check --fix
else
  rumdl check
fi
"""

[tasks.link-check]
description = "Check if links are valid"
run = "lychee ."
