[tools]
gitleaks = "latest"
cargo-binstall = "latest"
"cargo:lychee" = "latest"
"cargo:rumdl" = "latest"

[tasks.pre-commit]
description = "Run pre-commit checks"
run = """
gitleaks protect -v --staged
lychee -v .
rumdl check

proj_dir=projects/daft
if git diff --cached --name-only | grep -q "^${proj_dir}/"; then
  echo "==> Staged files in ${proj_dir}/ detected, running pre-commit..."
  cd "$proj_dir"
  mise run pre-commit
fi
"""

[tasks.format-md]
description = "Format markdown files"
run = "rumdl check --fix"
